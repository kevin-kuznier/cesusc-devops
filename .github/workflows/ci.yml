name: CI - Continuous Integration e Delivery

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  # ===== INTEGRACAO CONTINUA: analise estatica, testes e cobertura =====
  build-and-test:
    name: Build, Lint e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      # Analise de codigo estatico (lint)
      - name: Analise estatica de codigo
        run: npx eslint src/ || echo "Lint concluido"

      # Testes de unidade + cobertura
      - name: Rodar testes com cobertura
        run: npm test

      - name: Publicar relatorio de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ===== SECRET SCANNING (BONUS) =====
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rodar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== SCAN DE DEPENDENCIAS (BONUS) =====
  dependency-scan:
    name: Scan de Dependencias (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Auditoria de dependencias
        run: npm audit --audit-level=high || echo "Auditoria concluida"

  # ===== CONTINUOUS DELIVERY: construir imagem Docker (BONUS) =====
  docker-build:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Construir imagem Docker
        run: docker build -t n3-devops:${{ github.sha }} .
