name: CD - Continuous Deployment EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ===== DEPLOY no EC2 via SSH =====
  deploy:
    name: Deploy na instancia EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app || git clone https://github.com/${{ github.repository }}.git ~/app && cd ~/app
            git pull origin main
            docker build -t n3-devops .
            docker stop n3-app || true
            docker rm n3-app || true
            docker run -d --name n3-app -p 80:3000 n3-devops

  # ===== DAST: scan dinamico de seguranca na app no ar (BONUS) =====
  zap_scan:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ success() }}
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://${{ secrets.EC2_HOST }}'
